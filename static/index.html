<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RL Resource Allocator Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --primary: #58a6ff;
            --secondary: #238636;
            --accent: #8957e5;
            --border: #30363d;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.4);
        }

        .card h2 {
            font-size: 14px;
            font-weight: 600;
            color: #8b949e;
            text-transform: uppercase;
            margin-top: 0;
            margin-bottom: 15px;
        }

        .metric-value {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 5px;
        }

        .metric-label {
            font-size: 12px;
            color: #8b949e;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            background-color: var(--secondary);
            color: #fff;
        }

        .chart-container {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: filter 0.2s;
        }

        .btn:hover {
            filter: brightness(1.1);
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th {
            text-align: left;
            font-size: 12px;
            color: #8b949e;
            border-bottom: 1px solid var(--border);
            padding: 10px;
        }

        td {
            padding: 12px 10px;
            font-size: 14px;
            border-bottom: 1px solid var(--border);
        }

        .success-text { color: #3fb950; }
        .warning-text { color: #d29922; }

    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>RL Resource Allocator</h1>
                <p style="font-size: 12px; margin-top:5px;">PPO-driven Infrastructure Intelligence</p>
            </div>
            <div class="status-badge">System Live</div>
        </header>

        <div class="dashboard-grid">
            <div class="card">
                <h2>Total Savings</h2>
                <div class="metric-value" id="savings-usd">$0.00</div>
                <div class="metric-label">Estimated USD / Month</div>
            </div>
            <div class="card">
                <h2>AI Efficiency</h2>
                <div class="metric-value" id="efficiency-percent">0.0%</div>
                <div class="metric-label">vs Random Baseline</div>
            </div>
            <div class="card">
                <h2>Agent Status</h2>
                <div class="metric-value" id="agent-status">Active</div>
                <div class="metric-label">Reward: <span id="current-reward">0.0</span></div>
            </div>
        </div>

        <div class="controls">
            <button class="btn" onclick="triggerReset()">Reset Environment</button>
            <button class="btn" style="background-color: var(--secondary);" onclick="triggerStep()">One Agent Step</button>
        </div>

        <div class="chart-container">
            <h2>Real-Time Resource Utilization</h2>
            <canvas id="metricsChart" height="100"></canvas>
        </div>

        <div class="card">
            <h2>Container Management</h2>
            <table id="container-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>NAME</th>
                        <th>CPU %</th>
                        <th>MEMORY %</th>
                        <th>PRIORITY</th>
                        <th>STATE</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Populated by JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('metricsChart').getContext('2d');
        let chartData = {
            labels: [],
            datasets: [{
                label: 'System Load Average',
                data: [],
                borderColor: '#58a6ff',
                backgroundColor: 'rgba(88, 166, 255, 0.1)',
                fill: true,
                tension: 0.4
            }]
        };
        const config = {
            type: 'line',
            data: chartData,
            options: {
                responsive: true,
                scales: {
                    x: { ticks: { color: '#8b949e' } },
                    y: { ticks: { color: '#8b949e' }, min: 0, max: 100 }
                },
                plugins: { legend: { display: false } }
            }
        };
        const myChart = new Chart(ctx, config);

        async function updateDashboard() {
            try {
                const metricsRes = await fetch('/metrics');
                const metrics = await metricsRes.json();
                
                const savingsRes = await fetch('/savings');
                const savings = await savingsRes.json();
                
                const stateRes = await fetch('/state');
                const state = await stateRes.json();

                // Update metrics
                document.getElementById('savings-usd').innerText = `$${savings.savings_usd}`;
                document.getElementById('efficiency-percent').innerText = `${savings.efficiency_gain_percent}%`;
                
                const agentRes = await fetch('/agent/status');
                const agent = await agentRes.json();
                document.getElementById('current-reward').innerText = agent.current_reward.toFixed(2);

                // Update Chart
                if (chartData.labels.length > 20) chartData.labels.shift();
                if (chartData.datasets[0].data.length > 20) chartData.datasets[0].data.shift();
                
                const timeStr = new Date().toLocaleTimeString();
                chartData.labels.push(timeStr);
                chartData.datasets[0].data.push(metrics.cpu_percent);
                myChart.update();

                // Update Table
                const tbody = document.querySelector('#container-table tbody');
                tbody.innerHTML = '';
                state.containers.forEach(c => {
                    const row = `<tr>
                        <td>${c.container_id.substring(0, 8)}</td>
                        <td style="font-weight: 600;">${c.name}</td>
                        <td class="${c.cpu_percent > 80 ? 'warning-text' : 'success-text'}">${c.cpu_percent.toFixed(1)}%</td>
                        <td>${c.memory_percent.toFixed(1)}%</td>
                        <td>${c.priority}</td>
                        <td><span class="status-badge" style="background-color: #238636;">Healthy</span></td>
                    </tr>`;
                    tbody.innerHTML += row;
                });

            } catch (err) {
                console.warn("API not ready yet or connection lost.");
            }
        }

        async function triggerReset() {
            await fetch('/reset', { method: 'POST' });
            updateDashboard();
        }

        async function triggerStep() {
            await fetch('/step', { method: 'POST' });
            updateDashboard();
        }

        setInterval(updateDashboard, 5000);
        updateDashboard();
    </script>
</body>
</html>
